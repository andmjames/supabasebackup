# Functions-only site — no front-end build.
[build]
  command = "echo 'No build step — Netlify Functions only'"
  publish = "public"

[functions]
  node_bundler = "esbuild"
  # Leave pg un-bundled so esbuild doesn't trip on its dynamic requires.
  external_node_modules = ["pg"]

# Scheduled function: Monday 12:00 UTC (8 AM EDT / 7 AM EST).
# Netlify cron is UTC and ignores DST. Use "0 13 * * 1" to never run before 8 AM.
[functions."supabase-backup"]
  schedule = "0 12 * * 1"
